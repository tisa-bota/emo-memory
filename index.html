<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EMO MEMORY</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8883a">
<link rel="apple-touch-icon" href="images/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --paper: #fdfbf8;
  --text: #2e2820;
  --text-mid: #6b5f52;
  --text-light: #a99880;
  --border: #e5ddd3;
  --shadow: rgba(80,55,30,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}

/* iOS PWA対応：背景を fixed div で実装（background-attachment:fixed が効かないため） */
#app-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: url('images/emomemory_bg.png'),
    radial-gradient(ellipse at 10% 10%, rgba(232,136,58,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 90%, rgba(106,148,194,0.07) 0%, transparent 55%);
  background-size: cover, auto, auto;
  background-position: top center, 0 0, 0 0;
  background-repeat: no-repeat, no-repeat, no-repeat;
  background-color: var(--bg);
}

header {
  max-width: 480px; margin: 0 auto;
  padding: 14px 20px 4px;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.18em; }
.logo em { font-style: normal; color: #e8883a; }

/* ── ハンバーガーメニュー ── */
.menu-wrap { position: relative; }
.menu-btn {
  width: 36px; height: 36px; background: var(--paper);
  border: 1.5px solid var(--border); border-radius: 12px;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  padding: 0; transition: all .2s;
}
.menu-btn:hover { background: #fff4e8; border-color: #e8883a; }
.menu-btn span {
  display: block; width: 16px; height: 1.5px;
  background: var(--text-mid); border-radius: 2px;
  transition: all .25s;
}
.menu-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.menu-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.dropdown {
  position: absolute; top: calc(100% + 8px); left: 0;
  background: var(--paper); border: 1.5px solid var(--border);
  border-radius: 18px; padding: 6px;
  box-shadow: 0 8px 28px rgba(80,55,30,0.16);
  min-width: 210px; z-index: 200;
  opacity: 0; transform: translateY(-6px) scale(0.97);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
  transform-origin: top left;
}
.dropdown.open {
  opacity: 1; transform: translateY(0) scale(1);
  pointer-events: all;
}
.dropdown-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 10px 12px; border: none; background: none;
  border-radius: 12px; cursor: pointer; font-family: inherit;
  text-align: left; transition: background .15s;
}
.dropdown-item:hover { background: #fff4e8; }
.di-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
.di-text { display: flex; flex-direction: column; gap: 1px; }
.di-title { font-size: 13px; font-weight: 600; color: var(--text); }
.di-sub { font-size: 10px; color: var(--text-light); }
.dropdown-sep { height: 1px; background: var(--border); margin: 4px 6px; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  display: flex; justify-content: center;
  pointer-events: none;
}
.nav-inner {
  max-width: 360px; width: 88%;
  background: var(--paper);
  border-radius: 22px 22px 0 0;
  box-shadow: 0 -4px 24px rgba(80,55,30,0.13);
  display: flex; align-items: stretch;
  pointer-events: all;
  overflow: hidden;
  border-top: 1.5px solid var(--border);
}
.nav-btn {
  flex: 1; border: none; background: none; cursor: pointer;
  font-family: inherit; padding: 10px 6px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: all .2s; position: relative;
}
.nav-btn .nb-icon { font-size: 18px; line-height: 1; transition: transform .2s; }
.nav-btn .nb-lbl { font-size: 9px; font-weight: 500; color: var(--text-light); letter-spacing: 0.08em; transition: color .2s; }
.nav-btn::after {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 0; height: 3px; background: #e8883a; border-radius: 0 0 4px 4px;
  transition: width .3s cubic-bezier(.34,1.56,.64,1);
}
.nav-btn.on .nb-icon { transform: translateY(-2px); }
.nav-btn.on .nb-lbl { color: #e8883a; font-weight: 700; }
.nav-btn.on::after { width: 28px; }
.nav-sep { width: 1px; background: var(--border); margin: 10px 0; flex-shrink: 0; }

/* ── Date Picker row ── */
.date-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border-radius: 14px; padding: 9px 12px;
  box-shadow: 0 2px 8px var(--shadow); margin-bottom: 10px;
}
.d-label { font-size: 10px; color: var(--text-light); letter-spacing: 0.08em; flex-shrink: 0; }
.date-input {
  flex: 1; min-width: 0; border: none; background: none; font-family: 'Shippori Mincho', serif;
  font-size: 13px; color: var(--text); outline: none; cursor: pointer; letter-spacing: 0.02em;
}
.date-input::-webkit-inner-spin-button,
.date-input::-webkit-calendar-picker-indicator { opacity: 0; }
.cal-btn {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
  width: 30px; height: 30px; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .2s; position: relative; overflow: hidden;
}
.cal-btn:hover { background: #fff4e8; border-color: #e8883a; }
.cal-btn input[type="date"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.time-input {
  border: none; background: none; font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; color: var(--text-mid); outline: none; width: 60px;
  text-align: right; cursor: pointer; flex-shrink: 0;
}

.wrap { max-width: 480px; margin: 0 auto; padding: 14px 16px 88px; }
.screen { display: none; }
.screen.on { display: block; }

.dateline { text-align: center; font-size: 11px; color: var(--text-light); margin-bottom: 14px; letter-spacing: 0.08em; }

.two-col-picker {
  display: flex; gap: 0; margin-bottom: 10px;
  background: var(--paper); border-radius: 18px;
  box-shadow: 0 2px 10px var(--shadow); overflow: hidden;
}
.picker-group { flex: 1; padding: 12px 10px; }
.picker-group:first-child { flex: 3; }
.picker-group:last-child  { flex: 2; }
.picker-divider { width: 1px; background: var(--border); margin: 12px 0; }
.group-label {
  font-size: 9px; letter-spacing: 0.18em; color: var(--text-light);
  font-weight: 600; text-align: center; margin-bottom: 8px;
}
.emo-grid.r3 { grid-template-columns: repeat(3,1fr); }
.emo-grid.r2 { grid-template-columns: repeat(2,1fr); }
.emo-grid { display: grid; gap: 5px; }
.emo-grid.r5 { grid-template-columns: repeat(5,1fr); }


.eb {
  border: 1.5px solid var(--border); background: var(--paper);
  border-radius: 14px; padding: 9px 4px 7px; cursor: pointer; text-align: center;
  transition: all .18s; font-family: inherit;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.eb:hover { transform: translateY(-2px); box-shadow: 0 5px 14px var(--shadow); }
.eb.on { transform: translateY(-2px); box-shadow: 0 5px 14px var(--shadow); }
.eb[data-e="嬉しい"].on .lbl { color:#f0b830; }
.eb[data-e="悲しい"].on .lbl { color:#6098d8; }
.eb[data-e="怒り"].on   .lbl { color:#e05858; }
.eb[data-e="エモい"].on  .lbl { color:#f09040; }
.eb[data-e="不安"].on   .lbl { color:#9070d0; }
.eb[data-e="楽しい"].on   .lbl { color:#f070a8; }
.eb[data-e="好き"].on   .lbl { color:#90c840; }
.eb[data-e="苦手"].on   .lbl { color:#50a860; }
.eb[data-e="願い"].on   .lbl { color:#e8d870; }
.eb[data-e="その他"].on .lbl { color:#60b8d8; }
.eb .sym { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.eb .lbl { font-size: 10px; font-weight: 500; color: var(--text-mid); }
.sym-dot { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sym-dot svg, .eb .sym svg { display: block; }

.eb[data-e="嬉しい"].on { background:#fffaee; border-color:#f0b830; }
.eb[data-e="悲しい"].on { background:#eef3fb; border-color:#6098d8; }
.eb[data-e="怒り"].on   { background:#fdf2f2; border-color:#e05858; }
.eb[data-e="エモい"].on  { background:#fff6ee; border-color:#f09040; }
.eb[data-e="不安"].on   { background:#f5f0fc; border-color:#9070d0; }
.eb[data-e="楽しい"].on   { background:#fdf0f7; border-color:#f070a8; }
.eb[data-e="好き"].on   { background:#f4fbee; border-color:#90c840; }
.eb[data-e="苦手"].on   { background:#eef8f0; border-color:#50a860; }
.eb[data-e="願い"].on   { background:#fdfbee; border-color:#e8d870; }
.eb[data-e="その他"].on { background:#eef7fb; border-color:#60b8d8; }

.intensity-wrap {
  background: var(--paper); border-radius: 18px; padding: 14px 16px;
  box-shadow: 0 2px 10px var(--shadow); margin-bottom: 10px;
}
.intensity-label { font-size: 11px; color: var(--text-light); margin-bottom: 10px; }
.stars { display: flex; gap: 10px; justify-content: center; }
.star-btn {
  background: none; border: none; cursor: pointer;
  font-size: 28px; line-height: 1; padding: 0; transition: transform .15s;
  color: #ddd;
}
.star-btn:hover { transform: scale(1.2); }
.star-btn.lit { color: #c49a3c; }

.card {
  background: var(--paper); border-radius: 18px; padding: 14px 16px;
  box-shadow: 0 2px 10px var(--shadow); margin-bottom: 10px;
}
.card label { display: block; font-size: 11px; color: var(--text-light); margin-bottom: 7px; letter-spacing: 0.06em; }
textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 12px;
  font-family: inherit; font-size: 13px; color: var(--text); background: var(--bg);
  resize: none; outline: none; line-height: 1.7; transition: border-color .2s;
}
textarea:focus { border-color: #e8883a; }
textarea::placeholder { color: #c8baaa; }

.photo-zone {
  border: 2px dashed var(--border); border-radius: 14px; padding: 16px;
  text-align: center; cursor: pointer; transition: all .2s;
  position: relative; overflow: hidden; background: var(--bg);
}
.photo-zone:hover { border-color: #e8883a; background: #fff9f3; }
.photo-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-zone .ph-icon { font-size: 22px; margin-bottom: 4px; }
.photo-zone .ph-hint { font-size: 11px; color: var(--text-light); }
#photo-preview { width: 100%; max-height: 150px; object-fit: cover; border-radius: 10px; display: none; }

.save-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #e8883a, #d4855c);
  color: white; border: none; border-radius: 16px;
  font-family: 'Shippori Mincho', serif; font-size: 16px; cursor: pointer;
  letter-spacing: 0.15em; box-shadow: 0 4px 18px rgba(232,136,58,.3); transition: all .2s;
}
.save-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(232,136,58,.38); }

/* ── Search Bar ── */
.search-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border-radius: 14px; padding: 8px 12px;
  box-shadow: 0 2px 8px var(--shadow); margin-bottom: 8px;
  border: 1.5px solid var(--border); transition: border-color .2s;
}
.search-row:focus-within { border-color: #e8883a; }
.search-icon { font-size: 14px; flex-shrink: 0; color: var(--text-light); }
.search-input {
  flex: 1; border: none; background: none; font-family: inherit;
  font-size: 13px; color: var(--text); outline: none;
}
.search-input::placeholder { color: #c8baaa; }
.search-clear {
  background: var(--border); border: none; border-radius: 50%;
  width: 18px; height: 18px; cursor: pointer; font-size: 9px;
  display: none; align-items: center; justify-content: center;
  color: var(--text-mid); line-height: 1; flex-shrink: 0;
}
.search-clear.on { display: flex; }

/* ── Date Jump Row ── */
.date-jump-row {
  display: flex; align-items: center; gap: 6px;
  background: var(--paper); border-radius: 14px; padding: 8px 12px;
  box-shadow: 0 2px 8px var(--shadow); margin-bottom: 8px;
}
.djump-label { font-size: 11px; color: var(--text-light); letter-spacing: 0.06em; }
.djump-selected { font-size: 12px; font-family: 'Shippori Mincho', serif; color: var(--text-mid); }
.djump-clear {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
  width: 24px; height: 24px; cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center; color: var(--text-light);
  transition: all .2s;
}
.djump-clear:hover { background: #fdf2f2; border-color: #e05858; color: #e05858; }

.filter-row { display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 8px; margin-bottom: 12px; align-items: center; }
.filter-grp-lbl { font-size: 9px; letter-spacing: 0.12em; color: var(--text-light); font-weight: 600; margin-left: 4px; flex-basis: 100%; margin-top: 2px; }
.chip {
  flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--paper); font-family: inherit; font-size: 11px; cursor: pointer;
  color: var(--text-light); transition: all .18s; white-space: nowrap;
}
.chip.on { background: #f0ece6; color: var(--text-mid); border-color: var(--text-mid); }
.chip[data-f="嬉しい"].on { background:#fffaee; color:#f0b830; border-color:#f0b830; }
.chip[data-f="悲しい"].on { background:#eef3fb; color:#6098d8; border-color:#6098d8; }
.chip[data-f="怒り"].on   { background:#fdf2f2; color:#e05858; border-color:#e05858; }
.chip[data-f="エモい"].on  { background:#fff6ee; color:#f09040; border-color:#f09040; }
.chip[data-f="不安"].on   { background:#f5f0fc; color:#9070d0; border-color:#9070d0; }
.chip[data-f="楽しい"].on   { background:#fdf0f7; color:#f070a8; border-color:#f070a8; }
.chip[data-f="好き"].on   { background:#f4fbee; color:#90c840; border-color:#90c840; }
.chip[data-f="苦手"].on   { background:#eef8f0; color:#50a860; border-color:#50a860; }
.chip[data-f="願い"].on   { background:#fdfbee; color:#c8b830; border-color:#c8b830; }
.chip[data-f="その他"].on { background:#eef7fb; color:#60b8d8; border-color:#60b8d8; }

.ecard {
  background: var(--paper); border-radius: 18px; padding: 13px 14px; margin-bottom: 9px;
  box-shadow: 0 2px 10px var(--shadow); border-left: 4px solid var(--border);
  cursor: pointer; transition: all .18s; animation: fadeUp .3s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.ecard:hover { transform: translateY(-2px); box-shadow: 0 6px 18px var(--shadow); }
.ecard-top { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.ecard-sym { font-size: 18px; line-height: 1; }
.ecard-name { font-size: 12px; font-weight: 700; }
.ecard-stars { font-size: 11px; margin-left: 2px; }
.ecard-date { font-size: 10px; color: var(--text-light); margin-left: auto; }
.ecard-text {
  font-size: 13px; line-height: 1.65; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ecard-thumb { width: 100%; max-height: 90px; object-fit: cover; border-radius: 8px; margin-top: 7px; }

.empty { text-align: center; padding: 44px 20px; color: var(--text-light); }
.empty .big { font-size: 44px; margin-bottom: 10px; }
.empty p { font-size: 13px; line-height: 1.8; }

.sc { background: var(--paper); border-radius: 20px; padding: 16px 18px; box-shadow: 0 2px 10px var(--shadow); margin-bottom: 12px; }
.sc-title { font-family: 'Shippori Mincho', serif; font-size: 13px; color: var(--text-mid); margin-bottom: 13px; letter-spacing: 0.08em; }
.kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.kpi { background: var(--bg); border-radius: 13px; padding: 12px; text-align: center; }
.kpi-n { font-family: 'Shippori Mincho', serif; font-size: 28px; line-height: 1; }
.kpi-s { font-size: 10px; color: var(--text-light); margin-top: 2px; }
.bar-chart { display: flex; flex-direction: column; gap: 7px; }
.br { display: flex; align-items: center; gap: 7px; }
.br-lbl { width: 56px; font-size: 10px; display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.br-sym { font-size: 14px; }
.br-track { flex: 1; height: 9px; background: var(--border); border-radius: 9px; overflow: hidden; }
.br-fill { height: 100%; border-radius: 9px; transition: width 1s cubic-bezier(.34,1.56,.64,1); }
.br-cnt { font-size: 11px; color: var(--text-light); width: 18px; text-align: right; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.idea-item { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.7; color: var(--text-mid); }
.list-tab-row { display: flex; gap: 0; margin: 8px 16px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.list-tab-btn { flex: 1; padding: 8px 0; font-size: 13px; font-family: inherit; border: none; background: var(--surface); color: var(--text-light); cursor: pointer; transition: background 0.15s, color 0.15s; }
.list-tab-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
.idea-card { background: var(--surface); border-radius: 14px; border-left: 4px solid #aaa; padding: 10px 13px; margin-bottom: 9px; }
.idea-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.idea-card-emo { font-size: 12px; font-weight: 600; }
.idea-card-date { font-size: 11px; color: var(--text-light); margin-left: auto; }
.idea-card-text { font-size: 13px; color: var(--text-mid); line-height: 1.65; }
.idea-fav-btn {
  background: none; border: none; cursor: pointer; font-size: 16px; line-height: 1;
  padding: 2px 4px; border-radius: 8px; transition: transform .15s; flex-shrink: 0;
}
.idea-fav-btn:active { transform: scale(1.3); }
/* ガーデン：お気に入りセクション */
.garden-fav-section {
  background: var(--paper); border-radius: 20px; padding: 14px 14px 12px;
  box-shadow: 0 2px 12px var(--shadow); margin-bottom: 12px;
}
.garden-fav-title { font-size: 11px; color: var(--text-light); letter-spacing: 0.1em; margin-bottom: 10px; }
.garden-fav-list { display: flex; flex-direction: column; gap: 8px; }
.garden-fav-card {
  background: var(--bg); border-radius: 12px; border-left: 4px solid #aaa;
  padding: 9px 12px; cursor: pointer;
}
.garden-fav-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.garden-fav-card-emo { font-size: 11px; font-weight: 600; }
.garden-fav-card-date { font-size: 10px; color: var(--text-light); margin-left: auto; }
.garden-fav-card-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; }

.overlay {
  position: fixed; inset: 0; background: rgba(46,40,32,.45); backdrop-filter: blur(5px);
  display: flex; align-items: flex-end; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.overlay.on { opacity: 1; pointer-events: all; }
.modal {
  background: var(--paper); border-radius: 24px 24px 0 0; padding: 18px 20px 44px;
  width: 100%; max-height: 80vh; overflow-y: auto;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.overlay.on .modal { transform: translateY(0); }
.modal-handle { width: 34px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 15px; }
.modal-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.modal-sym { font-size: 30px; }
.modal-ename { font-family: 'Shippori Mincho', serif; font-size: 18px; }
.modal-stars-line { font-size: 14px; }
.modal-dt { font-size: 11px; color: var(--text-light); margin-top: 1px; }
.modal-txt { font-size: 14px; line-height: 1.85; margin-bottom: 10px; }
.modal-idea { font-size: 12px; color: var(--text-light); line-height: 1.7; margin-bottom: 10px; }
.modal-img { width: 100%; border-radius: 14px; }

/* ── Garden ── */
.garden-card {
  background: var(--paper); border-radius: 20px; padding: 14px 14px 10px;
  box-shadow: 0 2px 12px var(--shadow); margin-bottom: 12px;
}
.garden-header {

<script>

// ── IndexedDB（テキスト entries + 写真 photos） ──
const IDB_NAME  = 'emo-memory-db';
const IDB_STORE = 'entries';
const IDB_PHOTOS = 'photos';

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 2); // v2: photosストア追加
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE))  db.createObjectStore(IDB_STORE);
      if (!db.objectStoreNames.contains(IDB_PHOTOS)) db.createObjectStore(IDB_PHOTOS);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToIDB(data) {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(JSON.stringify(data), 'kn2-entries');
  } catch(e) { console.warn('[IDB] save error', e); }
}

async function saveFlowerStatsToIDB(stats) {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(JSON.stringify(stats), 'kn2-flowerStats');
  } catch(e) { console.warn('[IDB] flowerStats save error', e); }
}

async function loadFlowerStatsFromIDB() {
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('kn2-flowerStats');
      req.onsuccess = () => resolve(req.result ? JSON.parse(req.result) : null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function loadFromIDB() {
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('kn2-entries');
      req.onsuccess = () => resolve(req.result ? JSON.parse(req.result) : null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

// 写真を photos ストアに保存（キー = entry.id）
async function savePhotoToIDB(entryId, base64) {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_PHOTOS, 'readwrite');
    tx.objectStore(IDB_PHOTOS).put(base64, entryId);
  } catch(e) { console.warn('[IDB] photo save error', e); }
}

// 写真を photos ストアから取得
async function loadPhotoFromIDB(entryId) {
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_PHOTOS, 'readonly');
      const req = tx.objectStore(IDB_PHOTOS).get(entryId);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

// 写真を photos ストアから削除
async function deletePhotoFromIDB(entryId) {
  try {
    const db = await openIDB();
    const tx = db.transaction(IDB_PHOTOS, 'readwrite');
    tx.objectStore(IDB_PHOTOS).delete(entryId);
  } catch(e) { console.warn('[IDB] photo delete error', e); }
}

// 全写真を取得（バックアップ用）{ id: base64, ... }
async function loadAllPhotosFromIDB() {
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_PHOTOS, 'readonly');
      const store = tx.objectStore(IDB_PHOTOS);
      const allData = {};
      // cursor で key と value を同時に取得（race condition 回避）
      const req = store.openCursor();
      req.onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) {
          allData[cursor.key] = cursor.value;
          cursor.continue();
        } else {
          resolve(allData);
        }
      };
      req.onerror = () => resolve({});
    });
  } catch(e) { return {}; }
}

// 旧データ移行：「感動」→「楽しい」、「驚き」→「エモい」へ変換
async function migrateKandou() {
  const kandou = entries.filter(e => e.emo === '感動');
  const odoroki = entries.filter(e => e.emo === '驚き');
  if (kandou.length === 0 && odoroki.length === 0) return;
  entries = entries.map(e => {
    if (e.emo === '感動') return { ...e, emo: '楽しい' };
    if (e.emo === '驚き') return { ...e, emo: 'エモい' };
    return e;
  });
  localStorage.setItem('kn2-entries', JSON.stringify(entries));
  await saveToIDB(entries);
  if (kandou.length > 0) console.log(`[migrate] 「感動」→「楽しい」に変換: ${kandou.length}件`);
  if (odoroki.length > 0) console.log(`[migrate] 「驚き」→「エモい」に変換: ${odoroki.length}件`);
  const total = kandou.length + odoroki.length;
  showToast(`✓ 旧データを移行しました（${total}件）`);
}

// 旧データ移行：entry.photo が残っていたら photosストアへ移動
async function migratePhotos() {
  let changed = false;
  for (const entry of entries) {
    if (entry.photo) {
      await savePhotoToIDB(entry.id, entry.photo);
      entry.photo = null;
      changed = true;
    }
  }
  if (changed) {
    localStorage.setItem('kn2-entries', JSON.stringify(entries));
    await saveToIDB(entries);
    console.log('[IDB] 旧写真データを photosストアへ移行完了');
  }
}

function getStageFromStars(count) {
  const rem = count % 10;
  if (rem === 0) return 0; // 🌱 種（0回、10回、20回…）
  if (rem <= 2)  return 1; // 🌿 双葉（1〜2、11〜12…）
  if (rem <= 4)  return 2; // 🍃 本葉（3〜4、13〜14…）
  if (rem <= 6)  return 3; // 🌸 蕾（5〜6、15〜16…）
  if (rem <= 8)  return 4; // 🌼 満開（7〜8、17〜18…）
  return 0;                // 🌱 種（9回、19回…）
}

function wcDotSVG(color, size = 28) {
  const s = size;
  const r = s / 2;
  const h = color.replace('#','');
  const n = parseInt(h.slice(0,2),16);
  const wobble = (i) => {
    const a = (i * 137.5 * Math.PI / 180);
    const d = (n % 3 + 1) * 0.06;
    return { dx: Math.cos(a)*d*s, dy: Math.sin(a)*d*s };
  };
  const blobs = [0,1,2,3].map(i => {
    const {dx,dy} = wobble(i);
    const rx = r * (0.72 + (n*i%7)*0.025);
    const ry = r * (0.68 + (n*i%5)*0.028);
    const rot = (n*i*17)%40 - 20;
    const alpha = 0.18 + (i*0.09);
    return `<ellipse cx="${r+dx}" cy="${r+dy}" rx="${rx}" ry="${ry}" transform="rotate(${rot},${r+dx},${r+dy})" fill="${color}" opacity="${alpha}"/>`;
  }).join('');
  const main = `<circle cx="${r}" cy="${r}" r="${r*0.72}" fill="${color}" opacity="0.82"/>`;
  const hi = `<ellipse cx="${r*0.72}" cy="${r*0.68}" rx="${r*0.28}" ry="${r*0.18}" fill="white" opacity="0.38"/>`;
  const edge = `<circle cx="${r}" cy="${r}" r="${r*0.82}" fill="none" stroke="${color}" stroke-width="${r*0.22}" opacity="0.12"/>`;

  const fid = `wc${h}s${s}`;
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="${fid}" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="${s*0.13}" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
    <g filter="url(#${fid})">${blobs}${edge}${main}</g>
    ${hi}
  </svg>`;
}

function loadPhoto(input) {
  const f = input.files[0]; if (!f) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = e => {
    img.onload = () => {
      const MAX = 1280;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoUrl = canvas.toDataURL('image/jpeg', 0.85);
      const p = document.getElementById('photo-preview');
      p.src = photoUrl; p.style.display = 'block';
      document.getElementById('pph').style.display = 'none';
      document.getElementById('photo-remove-btn').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

function updateFlowerPanel() {
  const panel = document.getElementById('flower-panel');
  const infoBar = document.getElementById('flower-info-bar');

  // 前回の非同期テスト画像をキャンセル
  if (_bgTestImg) {
    _bgTestImg.onload = null;
    _bgTestImg.onerror = null;
    _bgTestImg = null;
  }

  if (curFilter === 'all') {
    panel.classList.remove('on');
    infoBar.classList.remove('on');
    panel.style.backgroundImage = '';
    panel.style.backgroundSize = '';
    panel.style.backgroundPosition = '';
    return;
  }
  panel.classList.add('on');
  infoBar.classList.add('on');

  const totalCount = entries.filter(e => e.emo === curFilter).length;
  const stage = getStageFromStars(totalCount);
  const img = getFlowerImg(curFilter, stage);

  document.getElementById('flower-panel-img').src = img || '';
  document.getElementById('flower-star-count').textContent = `📝 ${totalCount}回`;

  // cycleCount: countから毎回計算（7回目で1本・17回目で2本…）
  const cycleCount = totalCount < 7 ? 0 : Math.floor((totalCount - 7) / 10) + 1;
  const rem = totalCount % 10;
  const pct = totalCount === 0 ? 0 : (rem === 0 ? 100 : rem <= 8 ? rem / 8 * 100 : 0);
  const bar = document.getElementById('flower-progress-bar');
  bar.style.width = pct + '%';
  bar.style.background = EMO[curFilter]?.c || '#e8883a';

  // 🌸N本 表示
  const cycleEl = document.getElementById('flower-cycle-count');
  if (cycleCount > 0) {
    cycleEl.textContent = `🌸 ${cycleCount}本`;
  } else {
    cycleEl.textContent = '';
  }

  // 背景画像の切り替え（周回数に応じて flowers_bg_1〜10）
  const bgIndex = Math.min(Math.max(cycleCount, 1), 10);
  const bgPath = `images/flowers_bg/flowers_bg_${bgIndex}.png`;
  const testImg = new Image();
  _bgTestImg = testImg;
  testImg.onload = () => {
    if (_bgTestImg !== testImg) return; // キャンセル済みなら無視
    panel.style.backgroundImage = `url('${bgPath}')`;
    panel.style.backgroundSize = 'cover';
    panel.style.backgroundPosition = 'center';
  };
  testImg.onerror = () => {
    if (_bgTestImg !== testImg) return; // キャンセル済みなら無視
    panel.style.backgroundImage = '';
    panel.style.backgroundSize = '';
    panel.style.backgroundPosition = '';
  };
  testImg.src = bgPath;
}

async function renderList() {
  const gen = ++_renderGen;  // この呼び出しの世代番号を取得
  const list = document.getElementById('elist');
  const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));
  let filtered = curFilter === 'all' ? sorted : sorted.filter(e => e.emo === curFilter);
  if (dateJumpDate) {
    filtered = filtered.filter(e => e.date.slice(0,10) === dateJumpDate);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(e =>
      (e.text && e.text.toLowerCase().includes(q)) ||
      (e.idea && e.idea.toLowerCase().includes(q))
    );
  }
  if (!filtered.length) {
    if (gen !== _renderGen) return;  // 古い世代なら反映しない
    list.innerHTML = `<div class="empty"><div class="big" style="display:flex;justify-content:center">${curFilter==='all'?'📖':wcDotSVG(EMO[curFilter]?.c||'#aaa',44)}</div><p>まだ記録がありません<br>今の気持ちを記録してみよう</p></div>`;
    return;
  }
  // 写真を一括取得
  const photoMap = {};
  await Promise.all(filtered.map(async e => {
    const ph = await loadPhotoFromIDB(e.id);
    if (ph) photoMap[e.id] = ph;
  }));
  if (gen !== _renderGen) return;  // await 後に世代が変わっていたら反映しない
  list.innerHTML = filtered.map(e => {
    const d = new Date(e.date);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${'日月火水木金土'[d.getDay()]}`;
    const thumb = photoMap[e.id] ? `<img class="ecard-thumb" src="${photoMap[e.id]}">` : '';
    const emoData = EMO[e.emo] || { c: '#aaa', bg: '#f5f5f5' };
    return `<div class="ecard" style="border-left-color:${emoData.c}" onclick="openModal(${e.id})">
      <div class="ecard-top">
        <span class="ecard-sym sym-dot" style="width:20px;height:20px">${wcDotSVG(emoData.c,20)}</span>
        <span class="ecard-name" style="color:${emoData.c}">${e.emo}</span>
        <span class="ecard-stars">${starHTML(e.star, emoData.c)}</span>
        <span class="ecard-date">${ds}</span>
      </div>
      <div class="ecard-text">${e.text}</div>
      ${thumb}
    </div>`;
  }).join('');
}

  saveToIDB(entries);
  renderIdeaList();
  renderGardenFav();

}

function loadEditPhoto(input) {
  const f = input.files[0]; if (!f) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = e => {
    img.onload = () => {
      const MAX = 1280;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      editPhotoUrl = canvas.toDataURL('image/jpeg', 0.85);
      const ph = document.getElementById('m-photo-edit');
      ph.src = editPhotoUrl; ph.style.display = 'block';
      document.getElementById('m-pph').style.display = 'none';
      document.getElementById('m-photo-remove-btn').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}

function calcStreak() {
  if (!entries.length) return 0;
  const days = new Set(entries.map(e => e.date.slice(0,10)));
  const today = new Date();
  let streak = 0;
  for (let i = 0; i < 3650; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = toDateVal(d);
    if (days.has(key)) { streak++; }
    else if (i === 0) { break; } // 今日記録なし → 昨日から遡って数える
    else break;
  }
  // 今日記録なければ昨日から数える
  if (streak === 0) {
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    for (let i = 0; i < 3650; i++) {
      const d = new Date(yesterday);
      d.setDate(d.getDate() - i);
      const key = toDateVal(d);
      if (days.has(key)) streak++;
      else break;
    }
  }
  return streak;
}

/* ────────── FLOWER GARDEN (PNG版) ────────── */
let gardenMonthOffset = 0;

function shiftGardenMonth(delta) {
  gardenMonthOffset += delta;
  if (gardenMonthOffset > 0) gardenMonthOffset = 0;
  drawGarden();
  renderGardenFav();
}

function getGardenMonth() {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + gardenMonthOffset);
  return { year: d.getFullYear(), month: d.getMonth() };
}

function getGardenStage(count) {
  if (count === 0)  return 0; // 種
  if (count <= 2)   return 1; // 双葉
  if (count <= 4)   return 2; // 本葉
  if (count <= 6)   return 3; // 蕾
  return 4;                   // 満開（7〜8回）
}

function getGardenImgPath(emo, stage) {
  return getFlowerImg(emo, stage) || 'images/flowers_400/seeds_0.png';
}

function drawGarden() {
  const { year, month } = getGardenMonth();
  const lbl = document.getElementById('garden-month-label');
  if (lbl) lbl.textContent = `${year}年${month + 1}月`;

  const countMap = {};
  Object.keys(EMO).forEach(k => countMap[k] = 0);
  entries.forEach(e => {
    const d = new Date(e.date);
    if (d.getFullYear() === year && d.getMonth() === month) {
      countMap[e.emo] = (countMap[e.emo] || 0) + 1;
    }
  });

  const container1 = document.getElementById('garden-flowers-top-1');
  const container2 = document.getElementById('garden-flowers-top-2');
  if (!container1 || !container2) return;

  const emoKeys = Object.keys(EMO);
  const firstHalf  = emoKeys.slice(0, 5);
  const secondHalf = emoKeys.slice(5, 10);

  function makeFlowerSlot(emo) {
    const cnt = countMap[emo];
    const stage = getGardenStage(cnt);
    const imgPath = getGardenImgPath(emo, stage);
    return `<div class="garden-flower-slot"><img class="garden-flower-img" src="${imgPath}" alt="${emo}" loading="lazy"></div>`;
  }
  function makeLabelSlot(emo) {
    const cnt = countMap[emo];
    const emoColor = (EMO[emo] || {}).c || '#aaa';
    const starsStyle = cnt > 0 ? `color:${emoColor}` : 'color:rgba(0,0,0,0.25)';
    const starsText = cnt > 0 ? (cnt > 99 ? '99+' : cnt) + '回' : '—';
    return `<div class="garden-label-slot">
      <div class="garden-label-name">${emo}</div>
      <div class="garden-label-stars" style="${starsStyle}">${starsText}</div>
    </div>`;
  }

  // カード1：前半5感情（花→ラベル）
  container1.innerHTML =
    firstHalf.map(makeFlowerSlot).join('') +
    firstHalf.map(makeLabelSlot).join('');

  // カード2：後半5感情（花→ラベル）
  container2.innerHTML =
    secondHalf.map(makeFlowerSlot).join('') +
    secondHalf.map(makeLabelSlot).join('');

  const labelsBar = document.getElementById('garden-labels-bar');
  if (labelsBar) labelsBar.innerHTML = '';
}

/* ────────── データ移行（エクスポート／インポート・ZIP版） ────────── */

// JSZip CDN をロード（初回エクスポート時のみ）
function loadJSZip() {
  return new Promise((resolve, reject) => {
    if (window.JSZip) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function exportData() {
  try {
    showToast('📦 バックアップを準備中…');
    await loadJSZip();

    const zip = new JSZip();
    const photosFolder = zip.folder('photos');

    // entries.json（photo=null のまま保存）
    const exportEntries = entries.map(e => ({ ...e, photo: null }));
    const jsonStr = JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), entries: exportEntries, flowerStats }, null, 2);
    zip.file('entries.json', jsonStr);

    // 写真を全件取得して photos/ に追加
    const allPhotos = await loadAllPhotosFromIDB();
    let photoCount = 0;
    for (const [idStr, base64] of Object.entries(allPhotos)) {
      // "data:image/jpeg;base64,XXXX" → バイナリ
      const base64Data = base64.split(',')[1];
      if (base64Data) {
        photosFolder.file(`${idStr}.jpg`, base64Data, { base64: true });
        photoCount++;
      }
    }

    // ZIP 生成
    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    a.href = url;
    a.download = `emomemory_backup_${stamp}.zip`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);

    const mb = (blob.size / 1024 / 1024).toFixed(1);
    showToast(`📦 保存しました（${exportEntries.length}件・写真${photoCount}枚・${mb}MB）`);
  } catch(e) {
    showToast('❌ 保存に失敗: ' + e.message);
    console.error(e);
  }
}

async function importData(input) {
  const file = input.files[0];
  if (!file) return;

  try {
    showToast('📂 読み込み中…');

    // ZIP か JSON かを判定
    if (file.name.endsWith('.zip')) {
      await loadJSZip();
      const zip = await JSZip.loadAsync(file);

      // entries.json を読む
      const jsonFile = zip.file('entries.json');
      if (!jsonFile) { showToast('❌ entries.json が見つかりません'); return; }
      const jsonStr = await jsonFile.async('string');
      const data = JSON.parse(jsonStr);
      if (!Array.isArray(data.entries)) { showToast('❌ ファイルの形式が正しくありません'); return; }

      // テキストデータをマージ（IDで重複排除）
      const existing = JSON.parse(localStorage.getItem('kn2-entries') || '[]');
      const existingIds = new Set(existing.map(e => e.id));
      const newEntries = data.entries.map(e => ({ ...e, photo: null })).filter(e => !existingIds.has(e.id));
      const merged = [...existing, ...newEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
      localStorage.setItem('kn2-entries', JSON.stringify(merged));
      await saveToIDB(merged);
      entries = merged;

      // 写真を photos/ から復元
      let photoCount = 0;
      const photoFiles = zip.folder('photos');
      if (photoFiles) {
        await Promise.all(Object.keys(zip.files).filter(n => n.startsWith('photos/') && !n.endsWith('/')).map(async name => {
          // キーを数値に変換（entry.id = Date.now() = 数値）
          const entryId = Number(name.replace('photos/', '').replace('.jpg', ''));
          if (isNaN(entryId) || entryId === 0) return;
          const base64 = await zip.file(name).async('base64');
          await savePhotoToIDB(entryId, 'data:image/jpeg;base64,' + base64);
          photoCount++;
        }));
      }

      renderList();
      showToast(`✓ 復元しました（新規 ${newEntries.length}件・写真 ${photoCount}枚追加）`);

      // flowerStats を復元（あれば）
      if (data.flowerStats) {
        flowerStats = data.flowerStats;
        localStorage.setItem('kn2-flowerStats', JSON.stringify(flowerStats));
        saveFlowerStatsToIDB(flowerStats);
      }

    } else {
      // 旧JSON形式の互換対応
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.version || !Array.isArray(data.entries)) {
        showToast('❌ ファイルの形式が正しくありません'); return;
      }
      const existing = JSON.parse(localStorage.getItem('kn2-entries') || '[]');
      const existingIds = new Set(existing.map(e => e.id));
      const newEntries = data.entries.filter(e => !existingIds.has(e.id));
      // 旧JSON に photo が含まれていれば IDB に移行
      for (const e of newEntries) {
        if (e.photo) {
          await savePhotoToIDB(e.id, e.photo);
          e.photo = null;
        }
      }
      const merged = [...existing, ...newEntries].sort((a, b) => new Date(b.date) - new Date(a.date));
      localStorage.setItem('kn2-entries', JSON.stringify(merged));
      await saveToIDB(merged);
      entries = merged;
      renderList();
      showToast(`✓ 復元しました（新規 ${newEntries.length}件追加）`);
      if (data.flowerStats) {
        flowerStats = data.flowerStats;
        localStorage.setItem('kn2-flowerStats', JSON.stringify(flowerStats));
        saveFlowerStatsToIDB(flowerStats);
      }
      if (data._photoStripped) {
        setTimeout(() => showToast('⚠ このバックアップに写真データはありません'), 2600);
      }
    }
  } catch(e) {
    showToast('❌ 読み込みエラー: ' + e.message);
    console.error(e);
  }
  input.value = '';
}

// 起動時：localStorageが空でもIndexedDBにデータがあれば復元、旧写真も移行
// ※ 全関数・変数の定義後に実行することで、末尾でinit()を安全に呼べる
(async function restoreIfNeeded() {
  const lsRaw = localStorage.getItem('kn2-entries');
  const lsData = lsRaw ? JSON.parse(lsRaw) : [];
  if (lsData.length === 0) {
    const idbData = await loadFromIDB();
    if (idbData && idbData.length > 0) {
      localStorage.setItem('kn2-entries', JSON.stringify(idbData));
      entries = idbData;
      console.log('[IDB] localStorageへ復元:', idbData.length, '件');
    }
  }
  // 旧データ「感動」→「楽しい」へ変換
  await migrateKandou();
  // 旧データ（entry.photo に Base64が残っているもの）を photosストアへ移行
  await migratePhotos();
  // 全関数定義済みの状態でinit()を実行
  init();
})();
</script>
