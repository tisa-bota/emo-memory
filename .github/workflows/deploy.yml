name: Deploy with cache busting

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject build date
        run: |
          DATE=$(date +%Y%m%d%H%M)
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '$DATE'/" sw.js
          sed -i "s/sw\.js?v=[^'\"']*/sw.js?v=$DATE/" index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
